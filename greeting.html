<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #3F1116; font-family: 'DM Sans', sans-serif; }
.wrap { background: #3F1116; border-radius: 14px; padding: 20px 28px; }
.header { font-size: 10px; font-weight: 400; color: #FFF1E9; letter-spacing: 0.35em; text-transform: uppercase; text-align: center; margin-bottom: 18px; opacity: 0.85; }
.gw { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.left { display: flex; flex-direction: column; gap: 8px; }
.greet { font-size: 22px; color: #FEEFDC; font-weight: 400; }
.nm { color: #FFF1E9; font-weight: 500; }
.date { font-size: 13px; color: #9D7960; font-weight: 400; }
.clock { font-size: 44px; font-weight: 300; color: #FEEFDC; line-height: 1; font-variant-numeric: tabular-nums; }
.ap { font-size: 16px; color: #9D7960; margin-left: 5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">remember why you started</div>
  <div class="gw">
    <div class="left">
      <div class="greet" id="greet">Good afternoon, <span class="nm">ghady</span></div>
      <div class="date" id="date">Friday, June 12</div>
    </div>
    <div class="clock" id="clock">4:43<span class="ap">PM</span></div>
  </div>
</div>
<script>
function tick(){
  const now=new Date();
  let h=now.getHours();
  const m=now.getMinutes().toString().padStart(2,'0');
  const ap=h>=12?'PM':'AM';
  let h12=h%12; if(h12===0)h12=12;
  document.getElementById('clock').innerHTML=h12+':'+m+'<span class="ap">'+ap+'</span>';
  let g='Good morning';
  if(h>=12&&h<17)g='Good afternoon';
  else if(h>=17||h<5)g='Good evening';
  document.getElementById('greet').innerHTML=g+', <span class="nm">ghady</span>';
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date').textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate();
}
tick();
setInterval(tick,1000);
</script>
</body>
</html>
